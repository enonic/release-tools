name: build-and-push
description: This is an action to automate Gradle build and push tasks

inputs:
  repoUser:
    description: 'When publishing which user to use.'
    required: true
  repoPassword:
    description: 'When publishing which password to use.'
    required: true
  publishTask:
    description: 'Gradle task when publishing is needed'
    default: 'build publish'
    required: false
  buildTask:
    description: 'Gradle task when only build is needed'
    default: 'build'
    required: false
  skipPublishing:
    description: 'Should publishing be fully skipped regardless of any other conditions'
    default: ''
    required: false
  dockerhubUsername:
    description: 'Dockerhub username'
    required: false
  dockerhubToken:
    description: 'Dockerhub token'
    required: false
  codecovToken:
    description: 'Codecov token'
    required: false
  npmToken:
    description: 'NPM token'
    required: false
  releaseBranch:
    description: 'Newline-separated list of branches treated as release branches. Empty disables release publishing.'
    default: |
      master
      main
    required: false
outputs:
  release:
    description: "If this build should be released"
    value: ${{ steps.publish_vars.outputs.release == 'true' && steps.check_branch.outputs.is_release_branch == 'true' }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - id: check_branch
      run: |
        CURRENT="${GITHUB_REF#refs/heads/}"
        IS_RELEASE=false
        while IFS= read -r branch; do
          branch="$(echo "$branch" | xargs)"
          [ -z "$branch" ] && continue
          if [ "$branch" = "$CURRENT" ]; then
            IS_RELEASE=true
            break
          fi
        done <<< "${{ inputs.releaseBranch }}"
        echo "is_release_branch=$IS_RELEASE" >> $GITHUB_OUTPUT
      shell: bash

    - name: Get publishing variables
      id: publish_vars
      uses: enonic/release-tools/publish-vars@master
      env:
        PROPERTIES_PATH: './gradle.properties'
        GITHUB_REPO_PRIVATE: ${{ github.event.repository.private }}


    - id: task_generator
      run: |
        if [ ${{ inputs.skipPublishing == 'true' || steps.publish_vars.outputs.repo == '' }} = true ] ||
           [ ${{ inputs.skipPublishing == '' && steps.check_branch.outputs.is_release_branch != 'true' }} = true ]
        then
          echo "task=${{ inputs.buildTask }}" >> $GITHUB_OUTPUT
        else
          echo "task=${{ inputs.publishTask }}" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ steps.publish_vars.outputs.javaVersion }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Set NPM token
      if: ${{ inputs.npmToken != '' }}
      run: npm config set //registry.npmjs.org/:_authToken ${{ inputs.npmToken }}
      shell: bash

    - run: ./gradlew ${{ steps.task_generator.outputs.task }} -Pcom.enonic.xp.app.production=true -PrepoKey=${{ steps.publish_vars.outputs.repo }} -PrepoUser=${{ inputs.repoUser }} -PrepoPassword=${{ inputs.repoPassword }} -PenonicRepoUsername=${{ inputs.repoUser }} -PenonicRepoPassword=${{ inputs.repoPassword }}
      shell: bash

    - uses: docker/setup-qemu-action@v4
      if: inputs.dockerhubUsername != '' && inputs.skipPublishing != 'true' && steps.publish_vars.outputs.release == 'true' && steps.check_branch.outputs.is_release_branch == 'true'
      with:
        image: tonistiigi/binfmt:qemu-v6.2.0
        platforms: arm64,amd64

    - uses: docker/setup-buildx-action@v4
      if: inputs.dockerhubUsername != '' && inputs.skipPublishing != 'true' && steps.publish_vars.outputs.release == 'true' && steps.check_branch.outputs.is_release_branch == 'true'

    - uses: docker/login-action@v4
      if: inputs.dockerhubUsername != '' && inputs.skipPublishing != 'true' && steps.publish_vars.outputs.release == 'true' && steps.check_branch.outputs.is_release_branch == 'true'
      with:
        username: ${{ inputs.dockerhubUsername }}
        password: ${{ inputs.dockerhubToken }}

    - name: Docker build and push
      uses: docker/build-push-action@v7
      if: inputs.dockerhubUsername != '' && inputs.skipPublishing != 'true' && steps.publish_vars.outputs.release == 'true' && steps.check_branch.outputs.is_release_branch == 'true'
      with:
        context: .
        pull: true
        no-cache: true
        push: true
        tags: enonic/${{ steps.publish_vars.outputs.projectName }}:${{ steps.publish_vars.outputs.version }}
        platforms: linux/amd64,linux/arm64

    - uses: codecov/codecov-action@v6
      with:
        token: ${{ inputs.codecovToken }}
