name: release
description: This is an action to create a release on GitHub

inputs:
  github-token:
    description: 'Github token or PAT.'
    required: true
runs:
  using: "composite"

  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get previous release tag
      id: get_previous_release_tag
      run: |
        PREVIOUS_RELEASE_TAG=$(git tag --sort=-version:refname --merged | (grep -E '^v([[:digit:]]+\.){2}[[:digit:]]+$' || true) | head -1)
        echo "previous_release_tag=$PREVIOUS_RELEASE_TAG" >> $GITHUB_OUTPUT
      shell: bash

    - name: Generate Release Notes
      uses: enonic/release-tools/generate-changelog@master
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PREVIOS_RELEASE_TAG: ${{ steps.get_previous_release_tag.outputs.previous_release_tag }}
        OUTPUT_FILE: changelog.md

    - name: Get publishing variables
      id: publish_vars
      uses: enonic/release-tools/publish-vars@master
      env:
        PROPERTIES_PATH: './gradle.properties'
        GITHUB_REPO_PRIVATE: ${{ github.event.repository.private }}

    - name: Create Release
      if: steps.publish_vars.outputs.release == 'true'
      id: create_release
      uses: softprops/action-gh-release@v3
      with:
        token: ${{ inputs.github-token }}
        tag_name: ${{ steps.publish_vars.outputs.tag_name }}
        target_commitish: ${{ github.sha }}
        body_path: changelog.md
        prerelease: ${{ steps.publish_vars.outputs.prerelease == 'true' }}

    - name: Write new snapshot version
      if: steps.publish_vars.outputs.release == 'true'
      uses: enonic/release-tools/write-properties@master
      with:
        path: './gradle.properties'
        property: 'version'
        value: ${{ steps.publish_vars.outputs.nextSnapshot }}

    - name: Commit and push new version
      if: steps.publish_vars.outputs.release == 'true'
      uses: EndBug/add-and-commit@v10
      with:
        add: ./gradle.properties
        message: 'Updated to next SNAPSHOT version'
        default_author: github_actions

    # The "Updated to next SNAPSHOT version" commit above is pushed with the
    # GITHUB_TOKEN, which by design does NOT trigger `on: push`. Dispatch the
    # calling workflow so the new SNAPSHOT is built and published. The workflow
    # must declare `workflow_dispatch` (present on the default branch) and the
    # token needs `actions: write`. Best-effort: the release already succeeded,
    # so a failed dispatch only emits a warning.
    - name: Trigger build of new snapshot version
      if: steps.publish_vars.outputs.release == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        workflow="${GITHUB_WORKFLOW_REF%%@*}"   # owner/repo/.github/workflows/x.yml
        workflow="${workflow##*/}"               # x.yml
        gh workflow run "$workflow" --ref "$GITHUB_REF_NAME" \
          || echo "::warning title=SNAPSHOT build not dispatched::Could not dispatch a build for the new SNAPSHOT version (the calling workflow may be missing 'workflow_dispatch' on the default branch, or Actions cannot run it). The release itself succeeded."
